name: Master CI & Distribution

on:
  push:
    branches: [ master ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'maven'
      - name: Cache Maven Wrapper
        uses: actions/cache@v4
        with:
          path: .mvn/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('**/maven-wrapper.properties') }}
      - name: Cache Spotless Index
        uses: actions/cache@v4
        with:
          path: ~/.spotless
          key: ${{ runner.os }}-spotless-${{ hashFiles('**/pom.xml') }}
      - name: Spotless Check
        run: ./mvnw spotless:check

  build:
    name: Build & Archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'maven'
      - name: Cache Maven Wrapper
        uses: actions/cache@v4
        with:
          path: .mvn/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('**/maven-wrapper.properties') }}
      - name: Build JAR
        run: ./mvnw -B clean package -DskipTests
      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: app-binary
          path: target/*.jar
          retention-days: 7

  test:
    name: Run Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'maven'
      - name: Cache Maven Wrapper
        uses: actions/cache@v4
        with:
          path: .mvn/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('**/maven-wrapper.properties') }}
      - name: Verify
        run: ./mvnw -B test

  security:
    name: Security Scan (CodeQL)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'maven'
      - name: Cache Maven Wrapper
        uses: actions/cache@v4
        with:
          path: .mvn/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('**/maven-wrapper.properties') }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'java'
      - name: Build for Scanning
        run: ./mvnw -B clean compile
      - name: Perform Scan
        uses: github/codeql-action/analyze@v4

  distribution:
    name: Publish Images
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v8
        with:
          name: app-binary
          path: target/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract project version
        id: project
        run: echo "version=$(./mvnw -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
      - name: Publish to Hub & GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            subhrodip/twitter-backend:${{ steps.project.outputs.version }}
            subhrodip/twitter-backend:latest
            ghcr.io/${{ github.repository_owner }}/twitter-backend:${{ steps.project.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/twitter-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
