name: PR Checker

on:
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Microsoft JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'maven'
      - name: Cache Maven Wrapper
        uses: actions/cache@v4
        with:
          path: .mvn/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('**/maven-wrapper.properties') }}
      - name: Cache Spotless Index
        uses: actions/cache@v4
        with:
          path: ~/.spotless
          key: ${{ runner.os }}-spotless-${{ hashFiles('**/pom.xml') }}
      - name: Run Spotless Check
        run: ./mvnw spotless:check

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Microsoft JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'maven'
      - name: Cache Maven Wrapper
        uses: actions/cache@v4
        with:
          path: .mvn/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('**/maven-wrapper.properties') }}
      - name: Run Maven Verify
        run: ./mvnw -B clean verify
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-binary
          path: target/*.jar
          retention-days: 1

  docker-smoke:
    name: Docker Smoke Test
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # Required to write to the GitHub Actions cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download JAR artifact
        uses: actions/download-artifact@v8
        with:
          name: pr-binary
          path: target/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Run Smoke Build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:pr-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
