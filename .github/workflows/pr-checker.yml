name: PR Checker

on:
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Lint Check
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Spotless Check
        run: ./mvnw spotless:check

  test:
    name: Build & Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Maven Verify
        run: ./mvnw -B clean verify

  docker-smoke:
    name: Docker Smoke Test
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Smoke Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pr-smoke:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
