name: Reusable Build & Test

on:
  workflow_call:
    inputs:
      skip-matrix-lint:
        description: 'Skip matrix linting to save time on internal pushes'
        type: boolean
        default: false

jobs:
  lint:
    name: Check Code Formatting
    strategy:
      matrix:
        platform: ${{ inputs.skip-matrix-lint && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Check Formatting (Spotless)
        run: ./mvnw spotless:check

  build-and-test:
    name: Build and Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build and Test
        run: ./mvnw -B clean verify
