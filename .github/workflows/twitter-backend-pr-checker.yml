name: PR & Feature Checker

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - 'feature/*'

jobs:
  pr-validation:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      # We skip matrix lint on internal feature pushes to save CI minutes, 
      # but it will run fully on the Pull Request.
      skip-matrix-lint: ${{ github.event_name == 'push' }}

  docker-smoke:
    name: Docker Smoke Build
    needs: pr-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pr-smoke:latest
