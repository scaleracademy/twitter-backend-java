services:
  app:
    build:
      context: .
      args:
        JAR_FILE: target/*.jar
    container_name: moo-api
    ports:
      - "${HOST_PORT:-8082}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - MYSQL_DB_HOST=${DB_HOST:-db}
      - MYSQL_DB_PORT=${DB_PORT:-3306}
      - MYSQL_DB_UNAME=${DB_USER:-moouser}
      - MYSQL_DB_PASSWD=${DB_PASS:-moopass}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moo-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mysql:8.4
    container_name: moo-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME:-twitter_clone}
      MYSQL_USER: ${DB_USER:-moouser}
      MYSQL_PASSWORD: ${DB_PASS:-moopass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpass}
    ports:
      - "3307:3306" # Mapped to 3307 to avoid local MySQL conflicts
    volumes:
      - moo-db-data:/var/lib/mysql
    networks:
      - moo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      timeout: 5s
      retries: 10
    restart: always

  adminer:
    image: adminer:latest
    container_name: moo-adminer
    ports:
      - "${ADMINER_PORT:-8083}:8080"
    depends_on:
      - db
    networks:
      - moo-network
    restart: always

networks:
  moo-network:
    driver: bridge

volumes:
  moo-db-data:
    driver: local
